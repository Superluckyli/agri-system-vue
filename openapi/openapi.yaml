openapi: 3.0.3
info:
  title: Agri System HTTP API
  version: 1.0.0
  description: 'Generated from Spring Boot + MyBatis-Plus controllers in this repository.

    Unified response wrapper: { code, msg, data } from common/domain/R.java.

    Auth baseline: No (Spring Security not enabled in current code).

    '
servers:
- url: http://localhost:8080
tags:
- name: Auth
- name: System User
- name: System Role
- name: System Menu
- name: Crop Variety
- name: Crop Batch
- name: Crop Growth Log
- name: Material Info
- name: Material Log
- name: IoT Data
- name: IoT Rule
- name: Task
- name: Task Log
- name: Report
x-needs-information:
- JWT token expiration/refresh strategy is not defined in current code.
- Enum semantics need confirmation: agri_task.status, material_inout_log.type, sys_menu.type,
    agri_task_rule.isEnable.
- Comma-separated path-array style (/{ids}) should be validated with API gateway/router.
- Timezone/date serialization contract is not explicitly configured in Jackson.
- Long/BigDecimal serialization strategy for Vue3+TS precision is not explicitly configured.
